services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: incidentlens
      POSTGRES_USER: incidentlens
      POSTGRES_PASSWORD: incidentlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://incidentlens:incidentlens@postgres:5432/incidentlens
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      MOCK_MODE: "true"
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app

volumes:
  postgres_data:

