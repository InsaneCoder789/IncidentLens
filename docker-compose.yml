services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: incidentlens
      POSTGRES_USER: incidentlens
      POSTGRES_PASSWORD: incidentlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://incidentlens:incidentlens@postgres:5432/incidentlens
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LLM_API_KEY: ${LLM_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_ORGANIZATION: ${SENTRY_ORGANIZATION:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      STATUSPAGE_URL: ${STATUSPAGE_URL:-}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - evidence_data:/app/storage/evidence

  worker:
    build:
      context: ./apps/api
    command: ["python", "-m", "app.jobs.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://incidentlens:incidentlens@postgres:5432/incidentlens
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      LLM_API_KEY: ${LLM_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_ORGANIZATION: ${SENTRY_ORGANIZATION:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      STATUSPAGE_URL: ${STATUSPAGE_URL:-}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/api:/app
      - evidence_data:/app/storage/evidence

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://api:8000
      BACKEND_API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  evidence_data:
